<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Owner Dashboard</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <header>

    <h1>Sales Dashboard</h1>

  </header>

  <section class="cart-section">

    <div class="title">

      <h2>Customer Orders</h2>

      <p>Private owner dashboard</p>

    </div>

    <div id="orders-list"></div>

    <div class="total-box">

      <h3>
        Total Sales:
        ₹<span id="sales-total">0</span>
      </h3>

    </div>

  </section>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // FIREBASE CONFIG

    const firebaseConfig = {

      apiKey: "AIzaSyA2NhmB-i3W5nLA62b4xJ_kKYmfHpxa508",

      authDomain: "bitebasket-925a7.firebaseapp.com",

      projectId: "bitebasket-925a7",

      storageBucket: "bitebasket-925a7.firebasestorage.app",

      messagingSenderId: "275401126053",

      appId: "1:275401126053:web:057d5e1197c2da60329d4c"

    };

    // INITIALIZE FIREBASE

    const app = initializeApp(firebaseConfig);

    const db = getFirestore(app);

    const ordersList = document.getElementById('orders-list')

    const salesTotal = document.getElementById('sales-total')

    let total = 0

    async function loadOrders(){

      const querySnapshot = await getDocs(collection(db,"orders"))

      querySnapshot.forEach((doc)=>{

        const order = doc.data()

        total += order.price

        ordersList.innerHTML += `

          <div class="cart-item">

            <h3>${order.name}</h3>

            <p>Sold Price: ₹${order.price}</p>

            <p>Date: ${order.date}</p>

            <p>Time: ${order.time}</p>

          </div>

        `

      })

      salesTotal.innerText = total

    }

    loadOrders()

  </script>

</body>

</html>
